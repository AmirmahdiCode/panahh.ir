<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گروه پناه | ورود</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --cream: #fdfbf7;
            --milk: #f5efe6;
            --beige: #ede4d8;
            --gold: #c8af93;
            --brown: #8b6f4e;
            --dark: #3e2c1c;
            --text: #5c4a3a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, var(--cream) 0%, #e8ddd0 50%, var(--beige) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(200,175,147,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(139,111,78,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .welcome-card {
            position: relative;
            z-index: 1;
            background: var(--white);
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            box-shadow: 0 12px 48px rgba(62,44,28,0.08), 0 2px 8px rgba(0,0,0,0.03);
            max-width: 520px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
            border: 1px solid rgba(200,175,147,0.15);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--milk);
            color: var(--brown);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 24px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, var(--milk), var(--beige));
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: var(--brown);
            border: 2px solid var(--gold);
            box-shadow: 0 8px 28px rgba(139,111,78,0.1);
        }

        .welcome-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #8b7a65;
            margin-bottom: 40px;
            line-height: 2;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 24px;
            border-radius: 1px;
        }

        .btn-enter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 44px;
            background: var(--dark);
            color: var(--white);
            text-decoration: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(62,44,28,0.25);
            letter-spacing: 0.5px;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(62,44,28,0.35);
            background: #4a3520;
        }

        .btn-enter i {
            font-size: 13px;
            transition: transform 0.3s;
        }

        .btn-enter:hover i {
            transform: translateX(-6px);
        }

        .welcome-footer {
            margin-top: 36px;
            font-size: 11px;
            color: #c4b49e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .welcome-footer .dot {
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 40px 24px;
                border-radius: 20px;
            }
            .welcome-title {
                font-size: 24px;
            }
            .welcome-icon {
                width: 80px;
                height: 80px;
                font-size: 34px;
            }
            .welcome-subtitle {
                font-size: 13px;
            }
            .btn-enter {
                padding: 14px 36px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="overlay-pattern"></div>

    <div class="welcome-card">
        <div class="welcome-badge">
            <i class="fa-solid fa-circle" style="font-size:6px;color:var(--gold);"></i>
            انجمن گفتگو
        </div>

        <div class="welcome-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h1 class="welcome-title">گروه پناه</h1>
        
        <p class="welcome-subtitle">
            فضایی امن برای تبادل نظر و گفتگوهای گروهی
        </p>

        <div class="divider"></div>
        
        <a href="list/login.html" class="btn-enter">
            ورود به پنل کاربری
            <i class="fa-solid fa-arrow-left-long"></i>
        </a>
        
        <div class="welcome-footer">
            <span class="dot"></span>
            <span>تمامی حقوق محفوظ است</span>
        </div>
    </div>

</body>
</html>
