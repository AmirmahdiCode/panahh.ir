<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گروه پناه</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --cream: #fdfbf7;
            --milk: #f5efe6;
            --beige: #ede4d8;
            --gold: #c8af93;
            --brown: #8b6f4e;
            --dark: #3e2c1c;
            --text: #5c4a3a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-card {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.06);
            max-width: 480px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--milk), var(--beige));
            border-radius: 50%;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: var(--brown);
            border: 3px solid var(--gold);
            box-shadow: 0 6px 24px rgba(139,111,78,0.12);
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #a08b73;
            margin-bottom: 36px;
            line-height: 1.8;
        }

        .welcome-subtitle span {
            display: block;
            font-size: 12px;
            margin-top: 4px;
            color: #c4b49e;
        }

        .btn-enter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--brown), var(--dark));
            color: var(--white);
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(62,44,28,0.2);
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(62,44,28,0.3);
            background: linear-gradient(135deg, #7a5f42, #4a3520);
        }

        .btn-enter i {
            font-size: 14px;
            transition: transform 0.3s;
        }

        .btn-enter:hover i {
            transform: translateX(-4px);
        }

        .welcome-footer {
            margin-top: 32px;
            font-size: 11px;
            color: #c4b49e;
        }

        .welcome-footer i {
            margin: 0 4px;
            color: var(--gold);
        }

        @media (max-width: 480px) {
            .welcome-card {
                padding: 36px 24px;
                border-radius: 20px;
            }
            .welcome-title {
                font-size: 26px;
            }
            .welcome-icon {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="welcome-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h1 class="welcome-title">گروه پناه</h1>
        
        <p class="welcome-subtitle">
            جای امن برای گفتگوهای خودمانی
            <span>جایی که حرف‌هات شنیده میشه</span>
        </p>
        
        <a href="list-login.html" class="btn-enter">
            ورود به گروه
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        
        <div class="welcome-footer">
            <i class="fa-solid fa-feather-pointed"></i>
            ساخته شده با عشق
            <i class="fa-solid fa-feather-pointed"></i>
        </div>
    </div>

</body>
</html>
