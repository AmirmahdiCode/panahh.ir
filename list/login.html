<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گروه پناه | ورود و ثبت‌نام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --cream: #fdfbf7;
            --milk: #f5efe6;
            --beige: #ede4d8;
            --gold: #c8af93;
            --brown: #8b6f4e;
            --dark: #3e2c1c;
            --text: #5c4a3a;
            --white: #ffffff;
            --red: #c0392b;
            --red-light: #fce4e4;
            --green: #27ae60;
            --green-light: #eafaf1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, var(--cream) 0%, #e8ddd0 50%, var(--beige) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(200,175,147,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(139,111,78,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 12px 48px rgba(62,44,28,0.08), 0 2px 8px rgba(0,0,0,0.03);
            max-width: 460px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(200,175,147,0.15);
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            padding: 32px 32px 0;
            text-align: center;
        }

        .auth-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, var(--milk), var(--beige));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--brown);
            border: 2px solid var(--gold);
            box-shadow: 0 6px 20px rgba(139,111,78,0.08);
        }

        .auth-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .auth-subtitle {
            font-size: 12px;
            color: #a08b73;
            margin-bottom: 0;
        }

        .tabs {
            display: flex;
            margin: 24px 32px 0;
            border-bottom: 2px solid var(--milk);
            gap: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 700;
            color: #b8a48e;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn i {
            font-size: 13px;
        }

        .tab-btn.active {
            color: var(--dark);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--brown);
            border-radius: 2px 2px 0 0;
        }

        .auth-form {
            padding: 28px 32px 36px;
        }

        .form-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .form-panel.active {
            display: flex;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b8a48e;
            font-size: 14px;
            transition: color 0.3s;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 13px 42px 13px 16px;
            border: 1.5px solid #e5ddd3;
            border-radius: 12px;
            font-size: 13px;
            color: var(--dark);
            background: var(--white);
            outline: none;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200,175,147,0.1);
        }

        .input-group:focus-within i {
            color: var(--brown);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--dark);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(62,44,28,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        .btn-submit:hover {
            background: #4a3520;
            box-shadow: 0 6px 20px rgba(62,44,28,0.3);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit i {
            font-size: 13px;
            transition: transform 0.3s;
        }

        .btn-submit:hover i {
            transform: translateX(-4px);
        }

        .message-box {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .message-box.error {
            display: block;
            background: var(--red-light);
            color: var(--red);
            border: 1px solid #f5c6cb;
        }

        .message-box.success {
            display: block;
            background: var(--green-light);
            color: var(--green);
            border: 1px solid #c3e6cb;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #a08b73;
            text-decoration: none;
            font-size: 12px;
            margin-top: 20px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--brown);
        }

        .back-link i {
            font-size: 10px;
        }

        .auth-footer {
            text-align: center;
            padding: 20px 32px;
            border-top: 1px solid var(--milk);
            font-size: 11px;
            color: #c4b49e;
        }

        @media (max-width: 480px) {
            .auth-header { padding: 28px 20px 0; }
            .tabs { margin: 20px 20px 0; }
            .auth-form { padding: 24px 20px 28px; }
            .auth-title { font-size: 20px; }
            .auth-icon { width: 60px; height: 60px; font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="overlay-pattern"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="auth-title">گروه پناه</h2>
            <p class="auth-subtitle">ورود یا ایجاد حساب کاربری</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">
                <i class="fa-solid fa-right-to-bracket"></i> ورود
            </button>
            <button class="tab-btn" onclick="switchTab('register')">
                <i class="fa-solid fa-user-plus"></i> ثبت‌نام
            </button>
        </div>

        <div class="auth-form">
            <div class="message-box" id="messageBox"></div>

            <div class="form-panel active" id="loginPanel">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="نام کاربری">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="رمز عبور">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button class="btn-submit" onclick="handleLogin()">
                    ورود به گروه
                    <i class="fa-solid fa-arrow-left-long"></i>
                </button>
            </div>

            <div class="form-panel" id="registerPanel">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="نام کاربری">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="text" id="regDisplayName" placeholder="نام نمایشی">
                    <i class="fa-solid fa-id-card"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="رمز عبور">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="regPasswordConfirm" placeholder="تکرار رمز عبور">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button class="btn-submit" onclick="handleRegister()">
                    ایجاد حساب
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>

            <a href="../index.html" class="back-link">
                <i class="fa-solid fa-chevron-right"></i>
                بازگشت به صفحه اصلی
            </a>
        </div>

        <div class="auth-footer">
            گروه پناه — تمامی حقوق محفوظ است
        </div>
    </div>

    <script>
        const API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnRidEbiFrqXTrbH06aMqx658z22URWGVkwFkOv6PP8ueUcMoxk52RJoPfBTH0nDKPFIXrx3Bb-aPxARveH1ZUCCOuKzGTZuRK-4YDMKPn9T62S5yA0gZbDbyIm__ew1ed_dPiSHgRFddzKX02JUZp0U2n0tUlF9Y1qNwU6jVlCleuQhSitz7wB5-_Vkv9yfuAGj4xfGbHK6-lysXHVT_wbEoB2DO5QfkqdFt67O0zQKal7e-uHVO7N0nyLluYzLPHq3UdmIXCjHh2Y93qzVFDYeCBcCaQ&lib=MQnzc2VC0bUwTLfXTRggiKD4g43jyBv7u';

        checkExistingLogin();

        function checkExistingLogin() {
            const userData = localStorage.getItem('panah_user');
            if (userData) {
                const user = JSON.parse(userData);
                verifyToken(user.token).then(valid => {
                    if (valid) {
                        window.location.href = 'vitrine.html';
                    } else {
                        clearLocalUser();
                    }
                });
            }
        }

        async function verifyToken(token) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getUserInfo',
                        token: token
                    })
                });
                const data = await res.json();
                return !data.error;
            } catch(e) {
                return false;
            }
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.form-panel');
            
            tabs.forEach(t => t.classList.remove('active'));
            panels.forEach(p => p.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
            
            hideMessage();
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('لطفاً نام کاربری و رمز عبور را وارد کنید.', 'error');
                return;
            }

            showMessage('در حال اتصال...', 'success');
            const btn = document.querySelector('#loginPanel .btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> در حال ورود...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });

                const data = await res.json();

                if (data.success) {
                    saveToLocal(data.user, data.token);
                    showMessage('ورود موفقیت‌آمیز. در حال انتقال...', 'success');
                    setTimeout(() => {
                        window.location.href = 'vitrine.html';
                    }, 800);
                } else {
                    showMessage(data.error || 'نام کاربری یا رمز عبور اشتباه است.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'ورود به گروه <i class="fa-solid fa-arrow-left-long"></i>';
                }
            } catch(e) {
                showMessage('خطا در ارتباط با سرور. لطفاً دوباره تلاش کنید.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'ورود به گروه <i class="fa-solid fa-arrow-left-long"></i>';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const displayName = document.getElementById('regDisplayName').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (!username || !displayName || !password) {
                showMessage('لطفاً تمام فیلدها را پر کنید.', 'error');
                return;
            }

            if (password.length < 4) {
                showMessage('رمز عبور باید حداقل ۴ کاراکتر باشد.', 'error');
                return;
            }

            if (password !== passwordConfirm) {
                showMessage('رمز عبور و تکرار آن مطابقت ندارند.', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('نام کاربری باید حداقل ۳ کاراکتر باشد.', 'error');
                return;
            }

            showMessage('در حال ثبت‌نام...', 'success');
            const btn = document.querySelector('#registerPanel .btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> در حال ثبت‌نام...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register',
                        username: username,
                        displayName: displayName,
                        password: password,
                        avatar: 'fa-user'
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showMessage('ثبت‌نام با موفقیت انجام شد. اکنون وارد شوید.', 'success');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regDisplayName').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regPasswordConfirm').value = '';
                    
                    setTimeout(() => {
                        switchTab('login');
                        hideMessage();
                    }, 1500);
                } else {
                    showMessage(data.error || 'خطا در ثبت‌نام. نام کاربری تکراری است.', 'error');
                }
            } catch(e) {
                showMessage('خطا در ارتباط با سرور. لطفاً دوباره تلاش کنید.', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = 'ایجاد حساب <i class="fa-solid fa-check"></i>';
        }

        function saveToLocal(user, token) {
            clearLocalUser();
            
            const userData = {
                id: user.id,
                username: user.username,
                displayName: user.displayName,
                avatar: user.avatar,
                bio: user.bio || '',
                userType: user.userType,
                token: token,
                loginTime: Date.now()
            };
            
            localStorage.setItem('panah_user', JSON.stringify(userData));
        }

        function clearLocalUser() {
            localStorage.removeItem('panah_user');
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = 'message-box ' + type;
            box.style.display = 'block';
        }

        function hideMessage() {
            const box = document.getElementById('messageBox');
            box.style.display = 'none';
            box.className = 'message-box';
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (document.getElementById('loginPanel').classList.contains('active')) {
                        handleLogin();
                    } else {
                        handleRegister();
                    }
                }
            });
        });
    </script>

</body>
</html>
