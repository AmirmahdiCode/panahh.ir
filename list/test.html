<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تست API گروه پناه</title>
    <style>
        :root {
            --cream: #fdfbf7;
            --milk: #f5efe6;
            --gold: #c8af93;
            --brown: #8b6f4e;
            --dark: #3e2c1c;
            --text: #5c4a3a;
            --white: #ffffff;
            --red: #c0392b;
            --green: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--cream);
            color: var(--text);
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: var(--dark);
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            color: #a08b73;
            font-size: 12px;
            margin-bottom: 24px;
        }

        .url-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5ddd3;
            border-radius: 10px;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 16px;
            direction: ltr;
            text-align: left;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .test-btn {
            padding: 10px 16px;
            border: 1.5px solid var(--gold);
            background: var(--white);
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            color: var(--brown);
            transition: all 0.2s;
            text-align: center;
        }

        .test-btn:hover {
            background: var(--milk);
            border-color: var(--brown);
        }

        .test-btn.primary {
            background: var(--brown);
            color: var(--white);
            border-color: var(--brown);
            grid-column: 1 / -1;
            font-size: 14px;
            padding: 14px;
        }

        .result-box {
            background: var(--white);
            border: 1.5px solid #e5ddd3;
            border-radius: 12px;
            padding: 16px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }

        .result-box.error {
            border-color: var(--red);
            background: #fff5f5;
        }

        .result-box.success {
            border-color: var(--green);
            background: #f5fff5;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .status-badge.ok { background: #eafaf1; color: var(--green); }
        .status-badge.err { background: #fce4e4; color: var(--red); }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .input-row input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 1.5px solid #e5ddd3;
            border-radius: 8px;
            font-size: 12px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-flask"></i> تست API - گروه پناه</h1>
        <p class="subtitle">بررسی اتصال به Google Apps Script و عیب‌یابی</p>

        <input type="text" class="url-input" id="apiUrl" placeholder="API URL را وارد کنید..." value="https://script.google.com/macros/s/AKfycbw2miVzyvIRLr1AgNCbDZvoAjQUTWfiaUoEpAZlFjOIhG0M_-AnX1p2MgtruGI67fTf9Q/exec">

        <div class="test-grid">
            <button class="test-btn" onclick="testGet()">GET - تست ساده</button>
            <button class="test-btn" onclick="testGetMessages()">GET - getMessages</button>
            <button class="test-btn" onclick="testPostEcho()">POST - تست echo</button>
            <button class="test-btn" onclick="testRegister()">POST - register</button>
            <button class="test-btn" onclick="testLogin()">POST - login</button>
            <button class="test-btn" onclick="testGetSettings()">POST - getSettings</button>
            <button class="test-btn" onclick="testGetOnlineUsers()">POST - getOnlineUsers</button>
            <button class="test-btn primary" onclick="testFullDiagnostic()">تشخیص کامل - همه تست‌ها</button>
        </div>

        <div class="input-row">
            <input type="text" id="testUsername" placeholder="نام کاربری تست">
            <input type="text" id="testDisplayName" placeholder="نام نمایشی تست">
            <input type="password" id="testPassword" placeholder="رمز عبور تست">
        </div>

        <div id="statusArea"></div>
        <div class="result-box" id="resultBox">منتظر تست...</div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        function getApiUrl() {
            return document.getElementById('apiUrl').value.trim();
        }

        function showResult(data, isError) {
            var box = document.getElementById('resultBox');
            var statusArea = document.getElementById('statusArea');
            
            box.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            box.className = 'result-box';
            
            if (isError) {
                box.classList.add('error');
                statusArea.innerHTML = '<span class="status-badge err"><i class="fa-solid fa-circle-xmark"></i> خطا</span>';
            } else {
                box.classList.add('success');
                statusArea.innerHTML = '<span class="status-badge ok"><i class="fa-solid fa-circle-check"></i> موفق</span>';
            }
        }

        async function testGet() {
            var url = getApiUrl();
            showResult('در حال تست GET: ' + url + '\n...');
            
            try {
                var res = await fetch(url);
                var text = await res.text();
                
                var output = 'Status: ' + res.status + ' ' + res.statusText + '\n';
                output += 'Headers:\n';
                res.headers.forEach(function(val, key) {
                    output += '  ' + key + ': ' + val + '\n';
                });
                output += '\nBody:\n' + text;
                
                showResult(output);
            } catch(e) {
                showResult('ERROR:\n' + e.toString() + '\n\nStack:\n' + e.stack, true);
            }
        }

        async function testGetMessages() {
            var url = getApiUrl() + '?action=getMessages';
            showResult('در حال تست: ' + url + '\n...');
            
            try {
                var res = await fetch(url);
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString(), true);
            }
        }

        async function testPostEcho() {
            var url = getApiUrl();
            showResult('در حال تست POST echo...');
            
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({action: 'echo', test: true, time: new Date().toString()})
                });
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString() + '\n\nنکته: اگه خطای CORS دادی، یعنی سرور پاسخ نمیده', true);
            }
        }

        async function testRegister() {
            var username = document.getElementById('testUsername').value || 'test_' + Date.now();
            var displayName = document.getElementById('testDisplayName').value || 'تست';
            var password = document.getElementById('testPassword').value || '1234';
            
            var url = getApiUrl();
            showResult('در حال ثبت‌نام: ' + username + '...');
            
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register',
                        username: username,
                        displayName: displayName,
                        password: password
                    })
                });
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString(), true);
            }
        }

        async function testLogin() {
            var username = document.getElementById('testUsername').value || 'test_user';
            var password = document.getElementById('testPassword').value || '1234';
            
            var url = getApiUrl();
            showResult('در حال ورود: ' + username + '...');
            
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString(), true);
            }
        }

        async function testGetSettings() {
            var url = getApiUrl();
            showResult('در حال دریافت تنظیمات...');
            
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({action: 'getSettings'})
                });
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString(), true);
            }
        }

        async function testGetOnlineUsers() {
            var url = getApiUrl();
            showResult('در حال دریافت کاربران آنلاین...');
            
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({action: 'getOnlineUsers'})
                });
                var text = await res.text();
                showResult('Status: ' + res.status + '\n\n' + text);
            } catch(e) {
                showResult('ERROR:\n' + e.toString(), true);
            }
        }

        async function testFullDiagnostic() {
            var output = '';
            var url = getApiUrl();
            
            output += 'URL: ' + url + '\n';
            output += 'زمان: ' + new Date().toLocaleString('fa-IR') + '\n';
            output += '='.repeat(60) + '\n\n';
            
            // تست ۱: GET ساده
            output += 'تست ۱: GET ساده\n' + '-'.repeat(40) + '\n';
            try {
                var res1 = await fetch(url);
                output += 'Status: ' + res1.status + '\n';
                output += 'Body: ' + (await res1.text()) + '\n\n';
            } catch(e) {
                output += 'ERROR: ' + e.toString() + '\n\n';
            }
            
            // تست ۲: POST ساده
            output += 'تست ۲: POST ساده\n' + '-'.repeat(40) + '\n';
            try {
                var res2 = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({action: 'echo', test: true})
                });
                output += 'Status: ' + res2.status + '\n';
                output += 'Body: ' + (await res2.text()) + '\n\n';
            } catch(e) {
                output += 'ERROR: ' + e.toString() + '\n\n';
            }
            
            // تست ۳: register
            output += 'تست ۳: POST register\n' + '-'.repeat(40) + '\n';
            try {
                var testUser = 'diag_' + Date.now();
                var res3 = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register',
                        username: testUser,
                        displayName: 'تشخیص',
                        password: '1234'
                    })
                });
                output += 'Status: ' + res3.status + '\n';
                output += 'Body: ' + (await res3.text()) + '\n\n';
            } catch(e) {
                output += 'ERROR: ' + e.toString() + '\n\n';
            }
            
            // تست ۴: getSettings
            output += 'تست ۴: POST getSettings\n' + '-'.repeat(40) + '\n';
            try {
                var res4 = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({action: 'getSettings'})
                });
                output += 'Status: ' + res4.status + '\n';
                output += 'Body: ' + (await res4.text()) + '\n\n';
            } catch(e) {
                output += 'ERROR: ' + e.toString() + '\n\n';
            }
            
            showResult(output);
        }
    </script>
</body>
</html>
